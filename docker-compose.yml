services:
  picontrol-api:
    build: ./backend
    container_name: picontrol-api
    ports:
      - "5005:5005"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data

      # ── File OS dell'host ─────────────────────────────────────────
      - /etc/os-release:/host/os-release:ro
      - /etc/hostname:/host/hostname:ro
      - /etc/resolv.conf:/host/resolv.conf:ro       # per lettura DNS

      # ── Raspberry Pi: device-tree con modello hardware ────────────
      # Decommentare solo su Raspberry Pi — assente su altri sistemi
      # - /proc/device-tree:/host/device-tree:ro
      - /mnt/storage1:/mnt/storage1
    environment:
      - NODE_ENV=production
      - PORT=5005
      - DATA_PATH=/app/data

    # privileged + pid:host: necessari per nsenter (network/mount ns, riavvio)
    # e per lsblk, smartctl, journalctl verso l'host
    privileged: true
    pid: host

    # host.docker.internal risolve l'IP dell'host Raspberry negli health check
    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped
    networks:
      - picontrol-net

  picontrol-frontend:
    build: ./frontend
    container_name: picontrol-frontend
    ports:
      - "4300:80"
    depends_on:
      - picontrol-api
    restart: unless-stopped
    networks:
      - picontrol-net

networks:
  picontrol-net:
    driver: bridge
