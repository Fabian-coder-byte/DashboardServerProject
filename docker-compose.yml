services:
  picontrol-api:
    build: ./backend
    container_name: picontrol-api
    ports:
      - "5005:5005"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      # File OS dell'host montati in sola lettura — usati per mostrare info reali del Raspberry
      - /etc/os-release:/host/os-release:ro
      - /etc/hostname:/host/hostname:ro
      - /proc/device-tree:/host/device-tree:ro
    environment:
      - NODE_ENV=production
      - PORT=5005
      - DATA_PATH=/app/data
    # privileged: necessario per lsblk (vede tutti i dispositivi) e nsenter (rimonta nell'host)
    privileged: true
    # host.docker.internal risolve l'IP dell'host Raspberry, usato negli health check
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - picontrol-net

  picontrol-frontend:
    build: ./frontend
    container_name: picontrol-frontend
    ports:
      - "4300:80"
    depends_on:
      - picontrol-api
    restart: unless-stopped
    networks:
      - picontrol-net

networks:
  picontrol-net:
    driver: bridge
