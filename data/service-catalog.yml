    port: 5000
    compose_path: /srv/docker/kavita/docker-compose.yml
    volumes: []
    exposure: tailscale
    criticality: low
    healthcheck:
      type: http
      url: http://localhost:5000

  - name: Calibre Web
    description: Libreria ebook accessibile via browser
    category: Media
    type: docker
    icon: book
    url_local: http://spaceplayer98-server.local:8086
    url_tailscale: http://spaceplayer98-server:8086
