services:
  # ── Media ───────────────────────────────────────────────────────────────────
  - name: Jellyfin
    description: Media server per film, serie TV e cartoni
    category: Media
    type: docker
    icon: tv
    url_local: http://spaceplayer98-server.local:8096
    url_tailscale: http://spaceplayer98-server:8096
    port: 8096
    compose_path: /srv/docker/jellyfin/docker-compose.yml
    volumes:
      - /mnt/storage1/media:/media
      - /srv/docker/jellyfin/config:/config
    exposure: tailscale
    criticality: medium
    healthcheck:
      type: http
      url: http://localhost:8096

  - name: Navidrome
    description: Server musicale personale, compatibile Subsonic/Airsonic
    category: Media
    type: docker
    icon: music
    url_local: http://spaceplayer98-server.local:4533
    url_tailscale: http://spaceplayer98-server:4533
    port: 4533
    compose_path: /srv/docker/navidrome/docker-compose.yml
    volumes: []
    exposure: tailscale
    criticality: low
    healthcheck:
      type: http
      url: http://localhost:4533

  - name: Audiobookshelf
    description: Server per audiolibri e podcast
    category: Media
    type: docker
    icon: headphones
    url_local: http://spaceplayer98-server.local:13378
