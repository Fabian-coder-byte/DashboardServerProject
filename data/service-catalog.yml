services:
  - name: Jellyfin
    description: Media server per film, serie TV e cartoni
    category: Media
    type: docker
    icon: tv
    url_local: http://raspberry.local:8096
    url_tailscale: http://spaceplayer98-server:8096
    port: 8096
    compose_path: /srv/docker/jellyfin/docker-compose.yml
    volumes:
      - /mnt/storage1/media:/media
      - /srv/docker/jellyfin/config:/config
    exposure: tailscale
    criticality: medium
    healthcheck:
      type: http
      url: http://localhost:8096

  - name: Immich
    description: Backup e gestione foto personali
    category: Photos
    type: docker
    icon: image
    url_local: http://raspberry.local:2283
    url_tailscale: http://spaceplayer98-server:2283
    port: 2283
    compose_path: /srv/docker/immich/docker-compose.yml
    volumes:
      - /mnt/storage1/photos/immich-app:/usr/src/app/upload
    exposure: tailscale
    criticality: high
    healthcheck:
      type: http
      url: http://localhost:2283

  - name: Nextcloud
    description: Cloud personale per documenti, calendario e file
    category: Files
    type: docker
    icon: cloud
    url_local: http://raspberry.local:8080
    url_tailscale: http://spaceplayer98-server:8080
    port: 8080
    compose_path: /srv/docker/nextcloud/docker-compose.yml
    volumes:
      - /mnt/storage1/docs:/var/www/html/data
    exposure: tailscale
    criticality: high
    healthcheck:
      type: http
      url: http://localhost:8080

  - name: AdGuard Home
    description: DNS e ad-blocker di rete
    category: Networking
    type: docker
    icon: shield-check
    url_local: http://raspberry.local:3000
    url_tailscale: http://spaceplayer98-server:3000
    port: 3000
    compose_path: /srv/docker/adguard/docker-compose.yml
    expose: lan
    criticality: high
    healthcheck:
      type: http
      url: http://localhost:3000

  - name: Portainer
    description: Gestione container Docker via UI
    category: DevOps
    type: docker
    icon: box
    url_local: http://raspberry.local:9000
    url_tailscale: http://spaceplayer98-server:9000
    port: 9000
    compose_path: /srv/docker/portainer/docker-compose.yml
    expose: tailscale
    criticality: medium
    healthcheck:
      type: http
      url: http://localhost:9000

  - name: Uptime Kuma
    description: Monitor uptime per servizi e siti
    category: Monitoring
    type: docker
    icon: activity
    url_local: http://raspberry.local:3001
    url_tailscale: http://spaceplayer98-server:3001
    port: 3001
    compose_path: /srv/docker/uptime-kuma/docker-compose.yml
    expose: tailscale
    criticality: low
    healthcheck:
      type: http
      url: http://localhost:3001
