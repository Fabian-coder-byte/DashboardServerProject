    port: 13378
    compose_path: /srv/docker/audiobookshelf/docker-compose.yml
    volumes: []
    exposure: tailscale
    criticality: low
    healthcheck:
      type: http
      url: http://localhost:13378

  # ── Libri & Lettura ──────────────────────────────────────────────────────────
  - name: Kavita
    description: Reader per manga, fumetti e libri
    category: Media
    type: docker
    icon: book-open
    url_local: http://spaceplayer98-server.local:5000
